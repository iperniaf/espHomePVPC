name: Commit Lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
