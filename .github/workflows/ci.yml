name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint

      - name: Run yamllint
        run: yamllint .

  esphome-validate:
    name: ESPHome Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: python -m pip install --upgrade pip esphome

      - name: Prepare CI secrets
        run: cp secrets.example.yaml secrets.yaml

      - name: Validate ESPHome config
        run: esphome config esphome-pvpc.yaml
