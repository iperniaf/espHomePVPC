esphome:
  name: geekmagic
  friendly_name: Mini Display TV


esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:


# Enable Home Assistant API
api:


web_server:
  port: 80


ota:
  - platform: esphome


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mini-Display-Tv"
    password: "12345678"


captive_portal:


# -- First time install:
# ---- Use this file as a template for a new device ('Import from File') in the ESPHome Builder
# ---- Delete everything below these comments
# ---- Select 'INSTALL' then 'Manual download' to download the required binary (.bin) file
# ---- Flash the downloaded .bin file to the device via the GeekMagic web portal (bottom of Settings tab)
# ---- The now-ESPHome device should become 'ONLINE' in the ESPHome Builder
# ---- YAML updates can now be deployed OTA ('INSTALL' -> 'Wirelessly')


spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  interface: hardware
  id: spihwd
    
# status_led:
#   pin: GPIO2
  
output:
  - platform: ledc
    pin: GPIO25
    inverted: true
    id: backlight_pwm


light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

esp32_touch:
  # setup_mode: true


globals:
  - id: screen_page
    type: int
    restore_value: no
    initial_value: '0'


font:
  - file: "gfonts://Stack+Sans+Notch"
    id: font_small
    size: 14


  - file: "gfonts://Stack+Sans+Notch"
    id: font_large
    size: 25

  - file: "gfonts://Stack+Sans+Notch"
    id: font_medium
    size: 24


  - file: "gfonts://Stack+Sans+Notch"
    id: font_row
    size: 29


color:
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%


number:
  - platform: template
    name: "Price Color Yellow From"
    id: price_color_yellow_from
    optimistic: true
    restore_value: true
    initial_value: 0.50
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Price Color Red From"
    id: price_color_red_from
    optimistic: true
    restore_value: true
    initial_value: 0.70
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Euro 2 From"
    id: euro_2_from
    optimistic: true
    restore_value: true
    initial_value: 0.10
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Euro 3 From"
    id: euro_3_from
    optimistic: true
    restore_value: true
    initial_value: 0.20
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Price Min EUR"
    id: price_min_eur
    optimistic: true
    restore_value: true
    initial_value: 0.05
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Price Max EUR"
    id: price_max_eur
    optimistic: true
    restore_value: true
    initial_value: 0.30
    min_value: 0.01
    max_value: 1.50
    step: 0.01

  - platform: template
    name: "Power Max W"
    id: power_max_w
    optimistic: true
    restore_value: true
    initial_value: 3500
    min_value: 500
    max_value: 10000
    step: 100


display:  
  - platform: mipi_spi
    model: st7789v
    spi_id: spihwd
    dimensions: 
      height: 240
      width: 240
      offset_height: 0
      offset_width: 0
    invert_colors: true    
    dc_pin: GPIO02
    reset_pin: GPIO04
    #backlight_pin: GPIO25
    color_depth: 8
    #update_interval: never
    update_interval: 30s
    id: disp
    spi_mode: mode3
    lambda: |-
      it.fill(Color::BLACK);
      auto now = id(current_time).now();
      if (!now.is_valid()) {
        it.printf(16, 108, id(font_large), Color::WHITE, "Esperando hora...");
        return;
      }

      auto parse_price = [](const std::string &raw) -> float {
        if (raw.empty()) {
          return NAN;
        }
        std::string filtered;
        filtered.reserve(raw.size());
        for (char c : raw) {
          if ((c >= '0' && c <= '9') || c == ',' || c == '.' || c == '-') {
            filtered.push_back(c);
          }
        }
        if (filtered.empty()) {
          return NAN;
        }
        for (char &c : filtered) {
          if (c == ',') {
            c = '.';
          }
        }
        return strtof(filtered.c_str(), nullptr);
      };

      float prices[24] = {
        parse_price(id(price_00h).state), parse_price(id(price_01h).state), parse_price(id(price_02h).state), parse_price(id(price_03h).state),
        parse_price(id(price_04h).state), parse_price(id(price_05h).state), parse_price(id(price_06h).state), parse_price(id(price_07h).state),
        parse_price(id(price_08h).state), parse_price(id(price_09h).state), parse_price(id(price_10h).state), parse_price(id(price_11h).state),
        parse_price(id(price_12h).state), parse_price(id(price_13h).state), parse_price(id(price_14h).state), parse_price(id(price_15h).state),
        parse_price(id(price_16h).state), parse_price(id(price_17h).state), parse_price(id(price_18h).state), parse_price(id(price_19h).state),
        parse_price(id(price_20h).state), parse_price(id(price_21h).state), parse_price(id(price_22h).state), parse_price(id(price_23h).state)
      };

      float max_price = 0.0f;
      for (int i = 0; i < 24; i++) {
        if (!isnan(prices[i]) && prices[i] > max_price) {
          max_price = prices[i];
        }
      }

      float cfg_color_yellow = id(price_color_yellow_from).state;
      float cfg_color_red = id(price_color_red_from).state;
      float cfg_euro_2 = id(euro_2_from).state;
      float cfg_euro_3 = id(euro_3_from).state;
      float cfg_price_min = id(price_min_eur).state;
      float cfg_price_max = id(price_max_eur).state;
      float cfg_power_max = id(power_max_w).state;

      if (isnan(cfg_color_yellow)) cfg_color_yellow = 0.50f;
      if (isnan(cfg_color_red)) cfg_color_red = 0.70f;
      if (cfg_color_red < cfg_color_yellow) {
        float tmp = cfg_color_red;
        cfg_color_red = cfg_color_yellow;
        cfg_color_yellow = tmp;
      }

      if (isnan(cfg_euro_2)) cfg_euro_2 = 0.10f;
      if (isnan(cfg_euro_3)) cfg_euro_3 = 0.20f;
      if (cfg_euro_3 < cfg_euro_2) {
        float tmp = cfg_euro_3;
        cfg_euro_3 = cfg_euro_2;
        cfg_euro_2 = tmp;
      }

      if (isnan(cfg_price_min)) cfg_price_min = 0.05f;
      if (isnan(cfg_price_max)) cfg_price_max = 0.30f;
      if (cfg_price_max <= cfg_price_min) {
        cfg_price_max = cfg_price_min + 0.01f;
      }

      if (isnan(cfg_power_max) || cfg_power_max <= 0.0f) {
        cfg_power_max = 3500.0f;
      }

      if (id(screen_page) == 1) {
        const float pi = 3.14159265f;
        auto clamp01 = [](float v) -> float {
          if (v < 0.0f) return 0.0f;
          if (v > 1.0f) return 1.0f;
          return v;
        };
        auto draw_arc = [&](int cx, int cy, int r, int thick, int start_deg, int end_deg, float ratio, Color track, Color active, int step) {
          int start = start_deg;
          int end = end_deg;
          if (step > 0 && end < start) {
            end += 360;
          }
          if (step < 0 && end > start) {
            end -= 360;
          }

          int total = step > 0 ? (end - start) : (start - end);
          int active_len = (int) (total * clamp01(ratio));

          if (step > 0) {
            for (int d = start; d <= end; d++) {
              float rad = (d % 360) * pi / 180.0f;
              float c = cosf(rad);
              float s = sinf(rad);
              for (int t = 0; t < thick; t++) {
                int rr = r - t;
                int x = (int) (cx + c * rr);
                int y = (int) (cy + s * rr);
                it.draw_pixel_at(x, y, track);
              }
            }
            int active_end = start + active_len;
            for (int d = start; d <= active_end; d++) {
              float rad = (d % 360) * pi / 180.0f;
              float c = cosf(rad);
              float s = sinf(rad);
              for (int t = 0; t < thick; t++) {
                int rr = r - t;
                int x = (int) (cx + c * rr);
                int y = (int) (cy + s * rr);
                it.draw_pixel_at(x, y, active);
              }
            }
          } else {
            for (int d = start; d >= end; d--) {
              float rad = (d % 360) * pi / 180.0f;
              float c = cosf(rad);
              float s = sinf(rad);
              for (int t = 0; t < thick; t++) {
                int rr = r - t;
                int x = (int) (cx + c * rr);
                int y = (int) (cy + s * rr);
                it.draw_pixel_at(x, y, track);
              }
            }
            int active_end = start - active_len;
            for (int d = start; d >= active_end; d--) {
              float rad = (d % 360) * pi / 180.0f;
              float c = cosf(rad);
              float s = sinf(rad);
              for (int t = 0; t < thick; t++) {
                int rr = r - t;
                int x = (int) (cx + c * rr);
                int y = (int) (cy + s * rr);
                it.draw_pixel_at(x, y, active);
              }
            }
          }
        };

        const float power_w = id(house_power).state;
        const float price = id(pvpc_current_price).state;
        const bool power_ok = !isnan(power_w);
        const bool price_ok = !isnan(price);

        const float power_norm = power_ok ? clamp01(power_w / cfg_power_max) : 0.0f;
        const float price_span = cfg_price_max - cfg_price_min;
        const float price_norm = price_ok ? clamp01((price - cfg_price_min) / price_span) : 0.0f;

        Color power_color = Color(0, 200, 80);
        if (power_norm > 0.8f) {
          power_color = Color(220, 30, 30);
        } else if (power_norm >= 0.5f) {
          power_color = Color(235, 180, 20);
        }

        Color price_color = Color(0, 200, 80);
        if (price_norm > 0.7f) {
          price_color = Color(220, 30, 30);
        } else if (price_norm >= 0.4f) {
          price_color = Color(235, 180, 20);
        }

        draw_arc(120, 120, 92, 20, 200, 340, power_norm, Color(55, 55, 55), power_color, 1);
        draw_arc(120, 120, 92, 20, 160, 20, price_norm, Color(55, 55, 55), price_color, -1);

        it.printf(22, 94, id(font_small), Color(170, 170, 170), "0W");
        it.printf(178, 94, id(font_small), Color(170, 170, 170), "%.0fW", cfg_power_max);
        it.printf(18, 128, id(font_small), Color(170, 170, 170), "%.2f", cfg_price_min);
        it.printf(188, 128, id(font_small), Color(170, 170, 170), "%.2f", cfg_price_max);

        if (power_ok) {
          if (power_w >= 1000.0f || power_w <= -1000.0f) {
            it.printf(120, 88, id(font_medium), Color::WHITE, TextAlign::TOP_CENTER, "%.2f kW", power_w / 1000.0f);
          } else {
            it.printf(120, 88, id(font_medium), Color::WHITE, TextAlign::TOP_CENTER, "%.0f W", power_w);
          }
        } else {
          it.printf(120, 88, id(font_medium), Color::WHITE, TextAlign::TOP_CENTER, "--");
        }

        if (price_ok) {
          it.printf(120, 118, id(font_large), price_color, TextAlign::TOP_CENTER, "%.2f \xE2\x82\xAC", price);
          it.printf(66, 148, id(font_small), Color(180, 180, 180), "EUR/kWh");
        } else {
          it.printf(120, 118, id(font_large), Color::WHITE, TextAlign::TOP_CENTER, "--");
          it.printf(66, 148, id(font_small), Color(180, 180, 180), "EUR/kWh");
        }

        return;
      }

      for (int row = 0; row < 4; row++) {
        const int hour = (now.hour + row) % 24;
        const int y = 10 + row * 56;
        const float price = prices[hour];

        if (isnan(price)) {
          it.filled_rectangle(6, y + 5, 34, 34, Color(80, 80, 80));
          it.printf(48, y, id(font_row), Color::WHITE, "%02dh --", hour);
          continue;
        }

        float idx = 0.0f;
        if (max_price > 0.0f) {
          idx = price / max_price;
        }

        Color box_color = Color(0, 180, 0);
        if (idx > cfg_color_red) {
          box_color = Color(220, 0, 0);
        } else if (idx >= cfg_color_yellow) {
          box_color = Color(220, 180, 0);
        }
        it.filled_rectangle(6, y + 5, 34, 34, box_color);

        int euro_count = 1;
        Color euro_color = Color(0, 180, 0);
        if (price > cfg_euro_3) {
          euro_count = 3;
          euro_color = Color(220, 0, 0);
        } else if (price >= cfg_euro_2) {
          euro_count = 2;
          euro_color = Color(220, 180, 0);
        }

        it.printf(48, y, id(font_row), Color::WHITE, "%02dh %.2f", hour, price);

        if (euro_count == 1) {
          it.printf(206, y, id(font_large), euro_color, "\xE2\x82\xAC");
        } else if (euro_count == 2) {
          it.printf(188, y, id(font_large), euro_color, "\xE2\x82\xAC\xE2\x82\xAC");
        } else {
          it.printf(170, y, id(font_large), euro_color, "\xE2\x82\xAC\xE2\x82\xAC\xE2\x82\xAC");
        }
      }


