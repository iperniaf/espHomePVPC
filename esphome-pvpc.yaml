binary_sensor:
  - platform: esp32_touch
    id: page_button
    pin: GPIO32
    threshold: 1250
    on_press:
      then:
        - if:
            condition:
              lambda: return id(screen_page) == 0;
            then:
              - lambda: id(screen_page) = 1;
              - lvgl.page.show: page_dashboard
              - script.execute: refresh_ui
            else:
              - lambda: id(screen_page) = 0;
              - lvgl.page.show: page_hourly
              - script.execute: refresh_ui


time:
  - platform: homeassistant
    id: current_time
