script:
  - id: refresh_ui
    mode: restart
    then:
      - lambda: |-
          auto parse_price = [](const std::string &raw) -> float {
            if (raw.empty()) {
              return NAN;
            }
            std::string filtered;
            filtered.reserve(raw.size());
            for (char c : raw) {
              if ((c >= '0' && c <= '9') || c == ',' || c == '.' || c == '-') {
                filtered.push_back(c);
              }
            }
            if (filtered.empty()) {
              return NAN;
            }
            for (char &c : filtered) {
              if (c == ',') {
                c = '.';
              }
            }
            return strtof(filtered.c_str(), nullptr);
          };

          auto clamp01 = [](float v) -> float {
            if (v < 0.0f) return 0.0f;
            if (v > 1.0f) return 1.0f;
            return v;
          };

          auto format_2dec = [](float value) -> std::string {
            bool neg = value < 0.0f;
            if (neg) value = -value;
            int scaled = (int) lroundf(value * 100.0f);
            int whole = scaled / 100;
            int frac = scaled % 100;
            char out[24];
            snprintf(out, sizeof(out), neg ? "-%d.%02d" : "%d.%02d", whole, frac);
            return std::string(out);
          };

          float prices[24] = {
            parse_price(id(price_00h).state), parse_price(id(price_01h).state), parse_price(id(price_02h).state), parse_price(id(price_03h).state),
            parse_price(id(price_04h).state), parse_price(id(price_05h).state), parse_price(id(price_06h).state), parse_price(id(price_07h).state),
            parse_price(id(price_08h).state), parse_price(id(price_09h).state), parse_price(id(price_10h).state), parse_price(id(price_11h).state),
            parse_price(id(price_12h).state), parse_price(id(price_13h).state), parse_price(id(price_14h).state), parse_price(id(price_15h).state),
            parse_price(id(price_16h).state), parse_price(id(price_17h).state), parse_price(id(price_18h).state), parse_price(id(price_19h).state),
            parse_price(id(price_20h).state), parse_price(id(price_21h).state), parse_price(id(price_22h).state), parse_price(id(price_23h).state)
          };

          float max_price = 0.0f;
          for (int i = 0; i < 24; i++) {
            if (!isnan(prices[i]) && prices[i] > max_price) {
              max_price = prices[i];
            }
          }

          float cfg_color_yellow = id(price_color_yellow_from).state;
          float cfg_color_red = id(price_color_red_from).state;
          float cfg_euro_2 = id(euro_2_from).state;
          float cfg_euro_3 = id(euro_3_from).state;
          float cfg_price_min = id(price_min_eur).state;
          float cfg_price_max = id(price_max_eur).state;
          float cfg_power_max = id(power_max_w).state;

          if (isnan(cfg_color_yellow)) cfg_color_yellow = 0.50f;
          if (isnan(cfg_color_red)) cfg_color_red = 0.70f;
          if (cfg_color_red < cfg_color_yellow) {
            float tmp = cfg_color_red;
            cfg_color_red = cfg_color_yellow;
            cfg_color_yellow = tmp;
          }

          if (isnan(cfg_euro_2)) cfg_euro_2 = 0.10f;
          if (isnan(cfg_euro_3)) cfg_euro_3 = 0.20f;
          if (cfg_euro_3 < cfg_euro_2) {
            float tmp = cfg_euro_3;
            cfg_euro_3 = cfg_euro_2;
            cfg_euro_2 = tmp;
          }

          if (isnan(cfg_price_min)) cfg_price_min = 0.05f;
          if (isnan(cfg_price_max)) cfg_price_max = 0.30f;
          if (cfg_price_max <= cfg_price_min) {
            cfg_price_max = cfg_price_min + 0.01f;
          }

          if (isnan(cfg_power_max) || cfg_power_max <= 0.0f) {
            cfg_power_max = 3500.0f;
          }

          {
            auto now = id(current_time).now();
            lv_obj_t *boxes[4] = {id(row1_box), id(row2_box), id(row3_box), id(row4_box)};
            lv_obj_t *price_labels[4] = {id(row1_price), id(row2_price), id(row3_price), id(row4_price)};
            lv_obj_t *euro_labels[4] = {id(row1_euro), id(row2_euro), id(row3_euro), id(row4_euro)};

            if (now.is_valid()) {
              for (int row = 0; row < 4; row++) {
                const int hour = (now.hour + row) % 24;
                const float price = prices[hour];

                if (isnan(price)) {
                  lv_label_set_text_fmt(price_labels[row], "%02dh --", hour);
                  lv_label_set_text(euro_labels[row], "");
                  lv_obj_set_style_bg_color(boxes[row], lv_color_hex(0x505050), LV_PART_MAIN);
                  continue;
                }

                float idx = max_price > 0.0f ? (price / max_price) : 0.0f;
                uint32_t box_color = 0x00B400;
                if (idx > cfg_color_red) {
                  box_color = 0xDC0000;
                } else if (idx >= cfg_color_yellow) {
                  box_color = 0xDCB400;
                }
                lv_obj_set_style_bg_color(boxes[row], lv_color_hex(box_color), LV_PART_MAIN);

                int euro_count = 1;
                uint32_t euro_color = 0x00B400;
                if (price > cfg_euro_3) {
                  euro_count = 3;
                  euro_color = 0xDC0000;
                } else if (price >= cfg_euro_2) {
                  euro_count = 2;
                  euro_color = 0xDCB400;
                }

                std::string price_txt = format_2dec(price);
                char row_text[32];
                snprintf(row_text, sizeof(row_text), "%02dh %s", hour, price_txt.c_str());
                lv_label_set_text(price_labels[row], row_text);
                if (euro_count == 1) {
                  lv_label_set_text(euro_labels[row], "\xE2\x82\xAC");
                  lv_obj_set_x(euro_labels[row], 206);
                } else if (euro_count == 2) {
                  lv_label_set_text(euro_labels[row], "\xE2\x82\xAC\xE2\x82\xAC");
                  lv_obj_set_x(euro_labels[row], 188);
                } else {
                  lv_label_set_text(euro_labels[row], "\xE2\x82\xAC\xE2\x82\xAC\xE2\x82\xAC");
                  lv_obj_set_x(euro_labels[row], 170);
                }
                lv_obj_set_style_text_color(euro_labels[row], lv_color_hex(euro_color), LV_PART_MAIN);
              }
            } else {
              for (int row = 0; row < 4; row++) {
                lv_label_set_text(price_labels[row], "--");
                lv_label_set_text(euro_labels[row], "");
                lv_obj_set_style_bg_color(boxes[row], lv_color_hex(0x505050), LV_PART_MAIN);
              }
            }
          }

          const float power_w = id(house_power).state;
          const float price = id(pvpc_current_price).state;
          const bool power_ok = !isnan(power_w);
          const bool price_ok = !isnan(price);

          const float power_norm = power_ok ? clamp01(power_w / cfg_power_max) : 0.0f;
          const float price_span = cfg_price_max - cfg_price_min;
          const float price_norm = price_ok ? clamp01((price - cfg_price_min) / price_span) : 0.0f;

          uint32_t power_color = 0x00C850;
          if (power_norm > 0.8f) {
            power_color = 0xDC1E1E;
          } else if (power_norm >= 0.5f) {
            power_color = 0xEBB414;
          }

          uint32_t price_color = 0x00C850;
          if (price_norm > 0.7f) {
            price_color = 0xDC1E1E;
          } else if (price_norm >= 0.4f) {
            price_color = 0xEBB414;
          }

          const int power_target = (int) (power_norm * 100.0f);
          const int price_target = (int) (price_norm * 100.0f);

          lv_obj_set_style_arc_color(id(power_arc), lv_color_hex(power_color), LV_PART_INDICATOR);
          lv_obj_set_style_arc_color(id(price_value_arc), lv_color_hex(price_color), LV_PART_INDICATOR);

          lv_arc_set_value(id(power_arc), power_target);
          lv_arc_set_value(id(price_value_arc), price_target);

          {
            char power_max_text[16];
            snprintf(power_max_text, sizeof(power_max_text), "%dW", (int) lroundf(cfg_power_max));
            lv_label_set_text(id(dashboard_power_max), power_max_text);
          }
          {
            std::string price_min_txt = format_2dec(cfg_price_min);
            lv_label_set_text(id(dashboard_price_min), price_min_txt.c_str());
          }
          {
            std::string price_max_txt = format_2dec(cfg_price_max);
            lv_label_set_text(id(dashboard_price_max), price_max_txt.c_str());
          }

          if (power_ok) {
            if (power_w >= 1000.0f || power_w <= -1000.0f) {
              std::string kw_txt = format_2dec(power_w / 1000.0f);
              std::string power_text = kw_txt + " kW";
              lv_label_set_text(id(dashboard_power_value), power_text.c_str());
            } else {
              char power_text[16];
              snprintf(power_text, sizeof(power_text), "%d W", (int) lroundf(power_w));
              lv_label_set_text(id(dashboard_power_value), power_text);
            }
          } else {
            lv_label_set_text(id(dashboard_power_value), "--");
          }

          if (price_ok) {
            std::string price_txt = format_2dec(price);
            std::string price_value = price_txt + " \xE2\x82\xAC";
            lv_label_set_text(id(dashboard_price_value), price_value.c_str());
          } else {
            lv_label_set_text(id(dashboard_price_value), "--");
          }
          lv_obj_set_style_text_color(id(dashboard_price_value), lv_color_hex(price_color), LV_PART_MAIN);


