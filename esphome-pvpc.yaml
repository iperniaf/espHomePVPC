  - platform: template
    name: "Power Max W"
    id: power_max_w
    optimistic: true
    restore_value: true
    initial_value: 3500
    min_value: 500
    max_value: 10000
    step: 100


display:
  - platform: mipi_spi
    model: st7789v
    spi_id: spihwd
    dimensions:
      height: 240
      width: 240
      offset_height: 0
      offset_width: 0
    invert_colors: true
    dc_pin: GPIO02
    reset_pin: GPIO04
    color_depth: 16
    update_interval: never
    auto_clear_enabled: false
    id: disp
    spi_mode: mode3


