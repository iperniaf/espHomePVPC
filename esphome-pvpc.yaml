esphome:
  name: geekmagic
  friendly_name: Mini Display TV
  on_boot:
    priority: -10
    then:
      - lvgl.page.show: page_hourly
      - script.execute: refresh_ui


esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:


# Enable Home Assistant API
api:


web_server:
  port: 80


ota:
  - platform: esphome


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mini-Display-Tv"
    password: "12345678"


captive_portal:


# -- First time install:
# ---- Use this file as a template for a new device ('Import from File') in the ESPHome Builder
# ---- Delete everything below these comments
# ---- Select 'INSTALL' then 'Manual download' to download the required binary (.bin) file
# ---- Flash the downloaded .bin file to the device via the GeekMagic web portal (bottom of Settings tab)
# ---- The now-ESPHome device should become 'ONLINE' in the ESPHome Builder
# ---- YAML updates can now be deployed OTA ('INSTALL' -> 'Wirelessly')


spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  interface: hardware
  id: spihwd
    
# status_led:
#   pin: GPIO2
  
output:
  - platform: ledc
    pin: GPIO25
    inverted: true
    id: backlight_pwm


light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

esp32_touch:
  # setup_mode: true


globals:
  - id: screen_page
    type: int
    restore_value: no
    initial_value: '0'


font:
  - file: "gfonts://Stack+Sans+Notch"
    id: font_small
    size: 14


  - file: "gfonts://Stack+Sans+Notch"
    id: font_large
    size: 25

  - file: "gfonts://Stack+Sans+Notch"
    id: font_medium
    size: 24


  - file: "gfonts://Stack+Sans+Notch"
    id: font_row
    size: 29


color:
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%


number:
  - platform: template
    name: "Price Color Yellow From"
    id: price_color_yellow_from
    optimistic: true
    restore_value: true
    initial_value: 0.50
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Price Color Red From"
    id: price_color_red_from
    optimistic: true
    restore_value: true
    initial_value: 0.70
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Euro 2 From"
    id: euro_2_from
    optimistic: true
    restore_value: true
    initial_value: 0.10
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Euro 3 From"
    id: euro_3_from
    optimistic: true
    restore_value: true
    initial_value: 0.20
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Price Min EUR"
    id: price_min_eur
    optimistic: true
    restore_value: true
    initial_value: 0.05
    min_value: 0.00
    max_value: 1.00
    step: 0.01

  - platform: template
    name: "Price Max EUR"
    id: price_max_eur
    optimistic: true
    restore_value: true
    initial_value: 0.30
    min_value: 0.01
    max_value: 1.50
